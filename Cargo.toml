[package]
name = "open-cleverpad"
version = "0.4.1"
authors = ["DerFetzer <kontakt@der-fetzer.de>"]
edition = "2024"

# this lets you use `cargo fix`!
[[bin]]
name = "open-cleverpad"
test = false
bench = false

[profile.release]
lto = true
codegen-units = 1
debug = true

[profile.dev]
codegen-units = 1
opt-level = "z"

[dependencies.stm32f1xx-hal]
version = "0.11.0"
features = ["stm32f103", "medium", "stm32-usbd"]

[dependencies.cortex-m]
version = "0.7.7"

[dependencies.rtic]
version = "2.2.0"
features = ["thumbv7-backend"]

[dependencies]
rtic-monotonics = { version = "2.1.0", features = ["cortex-m-systick"] }
panic-halt = "1.0.0"
usb-device = { version = "0.3.2", features = ["control-buffer-256"]}
heapless = "0.9.0"
num_enum = { version = "0.7.6", default-features = false }
panic-reset = "0.1.1"
usbd-serial = "0.2.2"
defmt = "1.0.1"
critical-section = "1.2.0"
